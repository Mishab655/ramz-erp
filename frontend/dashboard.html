<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ramz Al Wahda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="bg-slate-900 text-slate-300 w-64 space-y-6 py-7 px-2 absolute inset-y-0 left-0 transform -translate-x-full lg:relative lg:translate-x-0 transition duration-200 ease-in-out z-40 shadow-xl">
        <div class="text-white flex items-center space-x-2 px-4 mb-8">
            <i class="fas fa-building text-blue-500 text-2xl"></i>
            <span class="text-2xl font-bold tracking-wider">Ramz Al Wahda</span>
        </div>
        
        <nav class="space-y-2 px-2">
            <a href="dashboard.html" class="block py-2.5 px-4 rounded transition duration-200 bg-blue-600 text-white">
                <i class="fas fa-chart-line mr-2"></i> Dashboard
            </a>
            <a href="branches.html" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-slate-800 hover:text-white">
                <i class="fas fa-code-branch mr-2"></i> Branches
            </a>
            <a href="employees.html" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-slate-800 hover:text-white">
                <i class="fas fa-users mr-2"></i> Employees
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div id="mainContent" class="flex-1 flex flex-col h-screen transition-all duration-200">
        <!-- Top Navbar -->
        <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center z-10 relative">
            <button id="sidebarToggleBtn" class="text-slate-500 hover:text-slate-700 focus:outline-none lg:hidden">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="flex-1 lg:flex-none"></div>
            
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <button class="flex items-center text-slate-600 hover:text-blue-600 focus:outline-none">
                        <i class="fas fa-bell text-xl"></i>
                        <span class="absolute top-0 right-0 bg-red-500 text-white rounded-full w-4 h-4 text-xs flex items-center justify-center -mt-1 -mr-1">3</span>
                    </button>
                </div>
                <div class="border-l border-slate-200 h-6 mx-2"></div>
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold">
                        A
                    </div>
                    <span id="userProfileName" class="text-sm font-medium text-slate-700 hidden sm:block">Admin</span>
                    <button id="logoutBtn" class="ml-4 text-sm text-red-500 hover:text-red-700 transition"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </header>

        <!-- Dashboard Content -->
        <main class="flex-1 overflow-y-auto p-6 bg-slate-50 fade-in">
            <div class="mb-8 flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Overview</h2>
                    <p class="text-slate-500 text-sm mt-1">Welcome back, here's what's happening today.</p>
                </div>
                <a href="employees.html" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition text-sm">
                    <i class="fas fa-plus mr-1"></i> Add Employee
                </a>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <!-- Total Employees -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex items-center space-x-4">
                    <div class="p-3 bg-blue-100 text-blue-600 rounded-lg">
                        <i class="fas fa-users text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-slate-500 text-sm font-medium">Total Employees</p>
                        <p id="statTotalEmployees" class="text-2xl font-bold text-slate-800">--</p>
                    </div>
                </div>

                <!-- Total Branches -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex items-center space-x-4">
                    <div class="p-3 bg-indigo-100 text-indigo-600 rounded-lg">
                        <i class="fas fa-building text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-slate-500 text-sm font-medium">Branches</p>
                        <p id="statTotalBranches" class="text-2xl font-bold text-slate-800">--</p>
                    </div>
                </div>


                <!-- Pending Salaries -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex items-center space-x-4">
                    <div class="p-3 bg-red-100 text-red-600 rounded-lg">
                        <i class="fas fa-money-bill-wave text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-slate-500 text-sm font-medium">Pending Salary</p>
                        <p id="statSalaryPending" class="text-2xl font-bold text-slate-800">AED --</p>
                    </div>
                </div>
            </div>

            <div class="mb-4 mt-8">
                <h3 class="text-lg font-bold text-slate-800 border-b pb-2">Documents Expiring Soon</h3>
            </div>
            
            <!-- Document Expiry Boxes Grid -->
            <div id="docExpiriesGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                <!-- Boxes injected via JS -->
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const stats = await fetchAPI('/dashboard/stats');
                document.getElementById('statTotalEmployees').textContent = stats.total_employees;
                document.getElementById('statTotalBranches').textContent = stats.total_branches;
                document.getElementById('statSalaryPending').textContent = 'AED ' + stats.total_salary_pending.toLocaleString();

                await loadExpiringDocsTabs();

            } catch (error) {
                console.error("Failed to load dashboard data", error);
            }
        });

        async function loadExpiringDocsTabs() {
            try {
                const docsByType = await fetchAPI('/dashboard/documents_expiry');
                const grid = document.getElementById('docExpiriesGrid');
                grid.innerHTML = '';

                const types = ["Passport", "Insurance", "Visa", "Emirates ID", "Labour Card", "Other"];

                types.forEach(type => {
                    const docs = docsByType[type] || [];
                    const count = docs.length;
                    
                    let icon = 'fa-file-alt';
                    let bgColor = 'bg-slate-100 text-slate-600';
                    if (type === 'Passport') { icon = 'fa-passport'; bgColor = 'bg-blue-100 text-blue-600'; }
                    else if (type === 'Insurance') { icon = 'fa-shield-alt'; bgColor = 'bg-green-100 text-green-600'; }
                    else if (type === 'Visa') { icon = 'fa-stamp'; bgColor = 'bg-purple-100 text-purple-600'; }
                    else if (type === 'Emirates ID') { icon = 'fa-id-card'; bgColor = 'bg-indigo-100 text-indigo-600'; }
                    else if (type === 'Labour Card') { icon = 'fa-briefcase'; bgColor = 'bg-orange-100 text-orange-600'; }
                    
                    const hasCritical = docs.some(d => new Date(d.expiry_date) < new Date(Date.now() + 30*24*60*60*1000));
                    
                    const box = document.createElement('div');
                    box.className = `bg-white rounded-xl shadow-sm border ${hasCritical ? 'border-red-300' : 'border-slate-100'} p-4 flex items-center space-x-3 transition hover:shadow-md`;
                    
                    box.innerHTML = `
                        <div class="p-3 ${hasCritical ? 'bg-red-100 text-red-600' : bgColor} rounded-lg">
                            <i class="fas ${icon} text-xl"></i>
                        </div>
                        <div>
                            <p class="text-slate-500 text-xs font-medium">${type} Expiring</p>
                            <div class="flex items-baseline space-x-2">
                                <p class="text-xl font-bold ${hasCritical ? 'text-red-600' : 'text-slate-800'}">${count}</p>
                                ${hasCritical ? '<span class="text-[10px] text-red-500 font-bold uppercase">&lt; 30d</span>' : ''}
                            </div>
                        </div>
                    `;
                    grid.appendChild(box);
                });

            } catch (e) {
                document.getElementById('docExpiriesGrid').innerHTML = '<div class="text-red-500">Failed to load expiring documents.</div>';
            }
        }
    </script>
</body>
</html>
