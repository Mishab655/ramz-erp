<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - Ramz Al Wahda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <!-- Sidebar (Same as Dashboard) -->
    <aside id="sidebar" class="bg-slate-900 text-slate-300 w-64 space-y-6 py-7 px-2 absolute inset-y-0 left-0 transform -translate-x-full lg:relative lg:translate-x-0 transition duration-200 ease-in-out z-20 shadow-xl">
        <div class="text-white flex items-center space-x-2 px-4 mb-8">
            <i class="fas fa-building text-blue-500 text-2xl"></i>
            <span class="text-2xl font-bold tracking-wider">Ramz Al Wahda</span>
        </div>
        
        <nav class="space-y-2 px-2">
            <a href="dashboard.html" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-slate-800 hover:text-white">
                <i class="fas fa-chart-line mr-2"></i> Dashboard
            </a>
            <a href="branches.html" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-slate-800 hover:text-white">
                <i class="fas fa-code-branch mr-2"></i> Branches
            </a>
            <a href="employees.html" class="block py-2.5 px-4 rounded transition duration-200 bg-blue-600 text-white">
                <i class="fas fa-users mr-2"></i> Employees
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div id="mainContent" class="flex-1 flex flex-col h-screen transition-all duration-200">
        <!-- Top Navbar -->
        <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center z-10 relative">
            <button id="sidebarToggleBtn" class="text-slate-500 hover:text-slate-700 focus:outline-none lg:hidden">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="flex-1 lg:flex-none"></div>
            
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold">A</div>
                    <span id="userProfileName" class="text-sm font-medium text-slate-700 hidden sm:block">Admin</span>
                    <button id="logoutBtn" class="ml-4 text-sm text-red-500 hover:text-red-700 transition"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main class="flex-1 overflow-y-auto p-6 bg-slate-50 fade-in">
            <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Employees</h2>
                    <p class="text-slate-500 text-sm mt-1">Manage employee records</p>
                </div>
                <div class="flex gap-2 w-full sm:w-auto">
                    <div class="relative flex-1 sm:w-64">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="searchInput" placeholder="Search by name..." class="pl-10 pr-4 py-2 w-full border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm">
                    </div>
                    <select id="branchFilter" class="border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm px-3 py-2 bg-white">
                        <option value="">All Branches</option>
                    </select>
                    <button onclick="openTrashModal()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg shadow hover:bg-slate-300 transition text-sm flex items-center whitespace-nowrap">
                        <i class="fas fa-trash-restore mr-1"></i> Trash
                    </button>
                    <a href="employee_detail.html?action=new" class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow hover:bg-blue-700 transition text-sm flex items-center whitespace-nowrap">
                        <i class="fas fa-plus mr-1"></i> Add
                    </a>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-slate-600 whitespace-nowrap">
                        <thead class="bg-slate-50 text-slate-500 font-medium">
                            <tr>
                                <th class="px-6 py-4">Employee</th>
                                <th class="px-6 py-4">Branch</th>
                                <th class="px-6 py-4">Visa Expiry</th>
                                <th class="px-6 py-4">ID Expiry</th>
                                <th class="px-6 py-4">Pending Salary</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employeesTableBody" class="divide-y divide-slate-100">
                            <tr><td colspan="7" class="px-6 py-10 text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Trash Modal -->
    <div id="trashModal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 modal-backdrop transition-opacity" aria-hidden="true"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full fade-in">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">Trash (Deleted Employees)</h3>
                        <button onclick="document.getElementById('trashModal').classList.add('hidden')" class="text-gray-400 hover:text-gray-500 focus:outline-none">
                            <span class="sr-only">Close</span>
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                    <div class="overflow-x-auto max-h-96">
                        <table class="w-full text-left text-sm text-slate-600 whitespace-nowrap">
                            <thead class="bg-slate-50 text-slate-500 font-medium sticky top-0">
                                <tr>
                                    <th class="px-6 py-3">Employee</th>
                                    <th class="px-6 py-3">Deleted Date</th>
                                    <th class="px-6 py-3 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="trashTableBody" class="divide-y divide-slate-100">
                                <tr><td colspan="3" class="px-6 py-10 text-center text-slate-500">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="button" onclick="document.getElementById('trashModal').classList.add('hidden')" class="w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const branchIdParam = urlParams.get('branch_id');
            
            await loadBranchOptions();
            
            if (branchIdParam) {
                document.getElementById('branchFilter').value = branchIdParam;
            }

            loadEmployees();

            document.getElementById('searchInput').addEventListener('input', debounce(loadEmployees, 300));
            document.getElementById('branchFilter').addEventListener('change', loadEmployees);
        });

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => { clearTimeout(timeout); func(...args); };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        async function loadBranchOptions() {
            try {
                const branches = await fetchAPI('/branches/');
                const select = document.getElementById('branchFilter');
                branches.forEach(b => {
                    const option = document.createElement('option');
                    option.value = b.id;
                    option.textContent = b.name;
                    select.appendChild(option);
                });
            } catch (e) {
                console.error("Failed to load branches for filter", e);
            }
        }

        async function loadEmployees() {
            const search = document.getElementById('searchInput').value;
            const branch_id = document.getElementById('branchFilter').value;
            const tbody = document.getElementById('employeesTableBody');
            
            tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-10 text-center text-slate-500">Loading employees...</td></tr>';
            
            try {
                let url = '/employees/';
                const params = new URLSearchParams();
                if (search) params.append('search', search);
                if (branch_id) params.append('branch_id', branch_id);
                if (params.toString()) url += '?' + params.toString();

                const employees = await fetchAPI(url);
                tbody.innerHTML = '';
                
                if (employees.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-10 text-center text-slate-500">No employees found.</td></tr>';
                    return;
                }

                // For determining if expiry is soon (within 30 days)
                const thirtyDaysFromNow = new Date();
                thirtyDaysFromNow.setDate(thirtyDaysFromNow.getDate() + 30);

                employees.forEach(emp => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition";
                    
                    const visaDate = new Date(emp.visa_expiry);
                    const idDate = new Date(emp.emirates_id_expiry);
                    
                    const isVisaExpiring = visaDate <= thirtyDaysFromNow;
                    const isIdExpiring = idDate <= thirtyDaysFromNow;

                    const visaClass = isVisaExpiring ? 'text-red-600 font-semibold' : 'text-slate-600';
                    const idClass = isIdExpiring ? 'text-red-600 font-semibold' : 'text-slate-600';
                    const statusClass = emp.status === 'Active' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-700';

                    tr.innerHTML = `
                        <td class="px-6 py-4 font-medium text-slate-800 flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 font-bold overflow-hidden border border-slate-300">
                                ${emp.photo_url ? `<img src="http://localhost:8000${emp.photo_url}" class="w-full h-full object-cover">` : emp.full_name.charAt(0)}
                            </div>
                            <div>
                                <div class="font-semibold">${emp.full_name}</div>
                                <div class="text-xs text-slate-500">${emp.phone_number}</div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-slate-600">Branch ${emp.branch_id}</td>
                        <td class="px-6 py-4 ${visaClass}">${visaDate.toLocaleDateString()}</td>
                        <td class="px-6 py-4 ${idClass}">${idDate.toLocaleDateString()}</td>
                        <td class="px-6 py-4 font-semibold ${emp.salary_pending > 0 ? 'text-red-500' : 'text-slate-600'}">AED ${emp.salary_pending}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${statusClass}">${emp.status}</span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <a href="employee_detail.html?id=${emp.id}" class="text-blue-600 hover:text-blue-800 transition px-2 py-1 bg-blue-50 rounded">View / Edit</a>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                showToast('Failed to load employees', 'error');
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-10 text-center text-red-500">Failed to load data.</td></tr>';
            }
        }

        async function openTrashModal() {
            document.getElementById('trashModal').classList.remove('hidden');
            const tbody = document.getElementById('trashTableBody');
            tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-10 text-center text-slate-500">Loading trash...</td></tr>';
            
            try {
                const employees = await fetchAPI('/employees/trashed');
                tbody.innerHTML = '';
                
                if (employees.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-10 text-center text-slate-500">Trash is empty.</td></tr>';
                    return;
                }

                employees.forEach(emp => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition";
                    const deletedDate = emp.deleted_at ? new Date(emp.deleted_at).toLocaleString() : 'N/A';
                    
                    tr.innerHTML = `
                        <td class="px-6 py-4 font-medium text-slate-800 flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 font-bold overflow-hidden border border-slate-300">
                                ${emp.photo_url ? `<img src="http://localhost:8000${emp.photo_url}" class="w-full h-full object-cover">` : emp.full_name.charAt(0)}
                            </div>
                            <div>
                                <div class="font-semibold">${emp.full_name}</div>
                                <div class="text-xs text-slate-500">${emp.phone_number}</div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-slate-600">${deletedDate}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="restoreEmployee(${emp.id})" class="text-green-600 hover:text-green-800 transition px-3 py-1 bg-green-50 rounded border border-green-200 font-medium">
                                <i class="fas fa-undo mr-1"></i> Restore
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                showToast('Failed to load trash', 'error');
                tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-10 text-center text-red-500">Failed to load data.</td></tr>';
            }
        }

        async function restoreEmployee(id) {
            try {
                await fetchAPI(`/employees/${id}/restore`, { method: 'POST' });
                showToast('Employee restored successfully');
                openTrashModal(); // reload trash
                loadEmployees(); // reload main list
            } catch (e) {
                showToast('Failed to restore employee', 'error');
            }
        }
    </script>
</body>
</html>
